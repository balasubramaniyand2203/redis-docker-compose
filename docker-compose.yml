version: '3.8'

services:
  redis-master:
    image: redis/redis-stack:latest
    container_name: redis-master
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./master/redis.conf:/usr/local/etc/redis/redis.conf
      - ./master/data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - redisnet

  redis-replica1:
    image: redis/redis-stack:latest
    container_name: redis-replica1
    command: ["redis-server", "/usr/local/etc/redis/replica.conf"]
    volumes:
      - ./replica1/replica.conf:/usr/local/etc/redis/replica.conf
      - ./replica1/data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis-master
    networks:
      - redisnet

  redis-replica2:
    image: redis/redis-stack:latest
    container_name: redis-replica2
    command: ["redis-server", "/usr/local/etc/redis/replica.conf"]
    volumes:
      - ./replica2/replica.conf:/usr/local/etc/redis/replica.conf
      - ./replica2/data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis-master
    networks:
      - redisnet

networks:
  redisnet:
    driver: bridge
